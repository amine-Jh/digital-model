# Next.js on Netlify — @netlify/plugin-nextjs (configured in Netlify UI).
# Build command / publish dir may also be set in the UI; this file adds secrets-scan exceptions.

[build.environment]
  # NEXT_PUBLIC_* Supabase values are meant for the browser and edge middleware.
  # They are inlined into `.netlify/edge-functions/.../node-middleware.js` at build time.
  # Netlify secrets scanning otherwise fails the deploy (exit code 2).
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY"
